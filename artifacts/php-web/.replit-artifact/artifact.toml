kind = "web"
previewPath = "/"
title = "PHP Web Server"
version = "1.0.0"
id = "artifacts/php-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22887
name = "web"
paths = ["/"]

[services.development]
# Vorher: run = "pnpm --filter @workspace/php-web run dev"
run = ["php", "-S", "0.0.0.0:22887", "-t", "artifacts/php-web/public"]

[services.env]
PORT = "22887"
BASE_PATH = "/"
# ... (oberer Teil bleibt gleich)

[services.production]
# Wir löschen den pnpm-build, da PHP nichts "bauen" muss
build = [] 
# Wir sagen Replit, dass es kein statischer Server ist, sondern ein eigener Prozess
run = ["php", "-S", "0.0.0.0:22887", "-t", "artifacts/php-web/public"]
# Wichtig: "serve" muss weg oder auf einen Port zeigen